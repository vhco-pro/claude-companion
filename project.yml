# XcodeGen project definition for Claude Companion.
# Generate: xcodegen generate   (or `make generate`)
# The app's code + deps live in the local CompanionKit Swift package (single source of truth).
# This Xcode target is a thin @main shell that produces the signed menu-bar .app and embeds the
# companion-hook executable - the one job SwiftPM can't do.
name: ClaudeCompanion

options:
  bundleIdPrefix: pro.vhco
  deploymentTarget:
    macOS: "14.0"
  minimumXcodeGenVersion: "2.40.0"

packages:
  CompanionKit:
    path: CompanionKit

targets:
  ClaudeCompanion:
    type: application
    platform: macOS
    sources:
      - path: ClaudeCompanion
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: pro.vhco.claude-companion
        PRODUCT_MODULE_NAME: ClaudeCompanion
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_FILE: ClaudeCompanion/Info.plist
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        SWIFT_VERSION: "6"
        CODE_SIGN_ENTITLEMENTS: ClaudeCompanion/ClaudeCompanion.entitlements
    dependencies:
      - package: CompanionKit
        product: CompanionKit
    # Build the companion-hook executable from the package and embed it in the bundle.
    preBuildScripts:
      - script: '"${SRCROOT}/scripts/build-hook.sh"'
        name: "Build companion-hook"
    postBuildScripts:
      - script: |
          set -e
          # Embed companion-hook into Contents/Helpers/ (the absolute path the installer writes
          # into ~/.claude/settings.json hook entries).
          APP="${BUILT_PRODUCTS_DIR}/${PRODUCT_NAME}.app"
          HELPERS_DIR="${APP}/Contents/Helpers"
          mkdir -p "${HELPERS_DIR}"
          cp "${SRCROOT}/CompanionKit/.build/release/companion-hook" "${HELPERS_DIR}/"
          chmod +x "${HELPERS_DIR}/companion-hook"
          # Embedding a binary after Xcode signed the app invalidates the seal → re-sign.
          # Release-only: Debug runs locally where the broken-from-embed seal is harmless.
          if [ "${CONFIGURATION}" != "Release" ]; then
            echo "Debug build - skipping distribution re-sign (Release-only)."
            exit 0
          fi
          IDENTITY="${EXPANDED_CODE_SIGN_IDENTITY:-${CODE_SIGN_IDENTITY:--}}"
          { [ "${IDENTITY}" = "Sign to Run Locally" ] || [ -z "${IDENTITY}" ]; } && IDENTITY="-"
          ENTITLEMENTS="${SRCROOT}/ClaudeCompanion/ClaudeCompanion.entitlements"
          echo "Re-signing embedded companion-hook + app with identity: ${IDENTITY}"
          /usr/bin/codesign --force --sign "${IDENTITY}" --timestamp=none "${HELPERS_DIR}/companion-hook"
          /usr/bin/codesign --force --deep --sign "${IDENTITY}" --timestamp=none \
            --entitlements "${ENTITLEMENTS}" "${APP}"
          /usr/bin/codesign --verify --deep --strict "${APP}"
        name: "Embed & re-sign companion-hook"

# Unit tests live in CompanionKit (Tests/CompanionKitTests) and run via `swift test`.

schemes:
  ClaudeCompanion:
    build:
      targets:
        ClaudeCompanion: all
    run:
      config: Debug
    archive:
      config: Release
