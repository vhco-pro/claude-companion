# PR test gate - runs the CompanionKit unit suite on every PR.
name: CI

on:
  pull_request:
  workflow_dispatch:

permissions: {}

jobs:
  test:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Select the newest installed Xcode
        run: sudo xcode-select -s "$(ls -d /Applications/Xcode_*.app | sort -V | tail -1)/Contents/Developer"
      - name: swift test
        run: swift test --package-path CompanionKit
