# PR test gate - runs the CompanionKit unit suite on every PR.
name: CI

on:
  pull_request:
  workflow_dispatch:

permissions: {}

jobs:
  test:
    runs-on: macos-26   # Xcode 26 / Swift 6.x - required to resolve GRDB 7 (swift-tools 6.0)
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Select the newest installed Xcode
        run: sudo xcode-select -s "$(ls -d /Applications/Xcode_*.app | sort -V | tail -1)/Contents/Developer"
      - name: swift test
        run: swift test --package-path CompanionKit
