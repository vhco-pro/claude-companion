version: 2
updates:
  # Swift packages - single source of truth is CompanionKit/Package.swift + Package.resolved.
  - package-ecosystem: swift
    directory: /CompanionKit
    schedule:
      interval: weekly
    commit-message:
      prefix: build
    groups:
      swift-deps:
        patterns:
          - "*"
  # GitHub Actions used by the CI + release workflows.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: ci
    groups:
      actions:
        patterns:
          - "*"
